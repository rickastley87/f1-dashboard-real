<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race · Pit Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    @view-transition {
      navigation: auto;
    }
    :root {
      --carbon: #0a0a0a;
      --paper: #f2ece0;
      --paper-2: #e8e1d2;
      --racing: #E8002D;
      --racing-hot: #FF2D55;
      --ink: #0a0a0a;
      --ink-2: #4a4438;
      --ink-3: #8a8172;
      --rule: #d4cec4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      opacity: 0;
      transition: opacity 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    }
    body.race-ready { opacity: 1; }

    .wrap { max-width: 880px; margin: 0 auto; padding: 28px 22px 72px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .back {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--ink);
      padding: 10px 16px;
      background: #fff;
    }
    .back:hover { background: var(--carbon); color: #fff; border-color: var(--carbon); }

    .hero-flag { font-size: 42px; line-height: 1; margin-bottom: 8px; }
    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(26px, 5vw, 38px);
      letter-spacing: -0.02em;
      line-height: 1.08;
    }
    h1 em { font-style: italic; color: var(--racing); font-weight: 600; }

    .panel {
      border: 1px solid var(--rule);
      background: #fff;
      padding: 22px 20px;
      margin-bottom: 18px;
    }
    .panel h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 14px;
    }
    .track-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px 24px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .track-grid { grid-template-columns: 1fr; }
    }
    .track-lead {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .track-meta {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.55;
    }
    .track-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .track-links a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--racing);
      text-decoration: none;
      border-bottom: 1px dashed currentColor;
      padding-bottom: 2px;
      align-self: flex-start;
    }
    .track-links a:hover { color: var(--racing-hot); }

    table.sch {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    table.sch th, table.sch td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--rule);
    }
    table.sch th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-3);
      width: 38%;
    }

    table.res {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.res th, table.res td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--rule);
      text-align: left;
    }
    table.res th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .pos { font-family: 'JetBrains Mono', monospace; font-weight: 700; width: 36px; }

    .err {
      padding: 20px;
      background: #fff;
      border: 1px solid var(--racing);
      font-size: 14px;
      color: var(--ink-2);
    }
    .loading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink-3);
      padding: 40px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="index.html" id="backHome">← Dashboard</a>
    </div>
    <div id="app"></div>
  </div>

  <script>
    const JOLPICA = 'https://api.jolpi.ca/ergast/f1';

    const SESSION_ROWS = [
      ['FirstPractice', 'Free practice 1'],
      ['SecondPractice', 'Free practice 2'],
      ['ThirdPractice', 'Free practice 3'],
      ['SprintShootout', 'Sprint shootout'],
      ['SprintQualifying', 'Sprint qualifying'],
      ['Sprint', 'Sprint'],
      ['Qualifying', 'Qualifying']
    ];

    function flagEmoji(country) {
      const c = String(country || '').trim().toLowerCase();
      const map = {
        australia:'🇦🇺', china:'🇨🇳', japan:'🇯🇵', usa:'🇺🇸','united states':'🇺🇸', canada:'🇨🇦', monaco:'🇲🇨', spain:'🇪🇸', austria:'🇦🇹',
        uk:'🇬🇧','united kingdom':'🇬🇧', britain:'🇬🇧', belgium:'🇧🇪', netherlands:'🇳🇱', italy:'🇮🇹', hungary:'🇭🇺', azerbaijan:'🇦🇿',
        singapore:'🇸🇬', mexico:'🇲🇽', brazil:'🇧🇷', qatar:'🇶🇦', uae:'🇦🇪','united arab emirates':'🇦🇪', bahrain:'🇧🇭', 'saudi arabia':'🇸🇦'
      };
      return map[c] || '🏁';
    }

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function fmtWhen(dateStr, timeStr) {
      if (!dateStr) return '—';
      const t = (timeStr && String(timeStr).trim()) ? String(timeStr).replace(/Z$/i, '') : '12:00:00';
      const d = new Date(`${dateStr}T${t}Z`);
      if (!Number.isFinite(d.getTime())) return String(dateStr);
      return d.toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
    }

    function raceTitleHtml(name) {
      const raw = String(name || 'Grand Prix');
      const m = raw.match(/^(.*)\s+(Grand Prix)$/i);
      if (m) return `${esc(m[1])} <em>${esc(m[2])}</em>`;
      return esc(raw);
    }

    function buildScheduleRows(race) {
      const out = [];
      for (const [key, label] of SESSION_ROWS) {
        const s = race[key];
        if (!s || !s.date) continue;
        out.push({ label, when: fmtWhen(s.date, s.time) });
      }
      if (race.date) {
        out.push({ label: 'Grand Prix', when: fmtWhen(race.date, race.time) });
      }
      return out;
    }

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(String(r.status));
      return r.json();
    }

    function qs() {
      const u = new URLSearchParams(window.location.search);
      const round = Math.max(0, parseInt(u.get('round') || '', 10)) || NaN;
      const season = String(u.get('season') || new Date().getFullYear()).replace(/\D/g, '') || String(new Date().getFullYear());
      return { round, season };
    }

    function render(race, results) {
      const C = race.Circuit || {};
      const L = C.Location || {};
      const lat = parseFloat(L.lat);
      const lon = parseFloat(L.long);
      const mapHref = (Number.isFinite(lat) && Number.isFinite(lon))
        ? `https://www.openstreetmap.org/?mlat=${encodeURIComponent(lat)}&mlon=${encodeURIComponent(lon)}&zoom=13`
        : null;
      const wiki = C.url ? String(C.url) : '';
      const hrefSafe = (u) => String(u || '').replace(/"/g, '&quot;');

      const sched = buildScheduleRows(race);
      const schedHtml = sched.length
        ? `<table class="sch"><tbody>${sched.map((row) =>
            `<tr><th>${esc(row.label)}</th><td>${esc(row.when)}</td></tr>`
          ).join('')}</tbody></table>`
        : '<p class="track-meta">No session times published yet.</p>';

      let resHtml = '';
      if (Array.isArray(results) && results.length) {
        const rows = results.slice(0, 22).map((row) => {
          const d = row.Driver || {};
          const c = row.Constructor || {};
          const name = esc(`${d.givenName || ''} ${d.familyName || ''}`.trim() || '—');
          const team = esc(String(c.name || '').replace(/\s+F1\s+Team/i, '') || '—');
          return `<tr><td class="pos">${esc(row.position || '—')}</td><td>${name}</td><td>${team}</td><td>${esc(row.points != null ? String(row.points) : '—')}</td></tr>`;
        }).join('');
        resHtml = `<div class="panel"><h2>Race result</h2><table class="res"><thead><tr><th class="pos">Pos</th><th>Driver</th><th>Team</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      }

      return ''
        + `<div class="hero-flag">${flagEmoji(L.country)}</div>`
        + `<div class="hero-eyebrow">Round ${esc(String(race.round).padStart(2, '0'))} · ${esc(race.season)}</div>`
        + `<h1>${raceTitleHtml(race.raceName)}</h1>`
        + `<div class="panel" style="margin-top:22px;"><h2>Circuit &amp; venue</h2>`
        + `<div class="track-grid">`
        + `<div><div class="track-lead">${esc(C.circuitName || 'Circuit')}</div>`
        + `<p class="track-meta">${esc(L.locality || '')}${L.locality && L.country ? ' · ' : ''}${esc(L.country || '')}</p>`
        + `<p class="track-meta" style="margin-top:10px;">Official weekend schedule and metadata from Jolpica (Ergast-compatible API).</p></div>`
        + `<div class="track-links">`
        + (wiki ? `<a href="${hrefSafe(wiki)}" target="_blank" rel="noopener noreferrer">Wikipedia →</a>` : '')
        + (mapHref ? `<a href="${hrefSafe(mapHref)}" target="_blank" rel="noopener noreferrer">Open map →</a>` : '')
        + `</div></div></div>`
        + `<div class="panel"><h2>Weekend schedule</h2>${schedHtml}</div>`
        + resHtml;
    }

    (function navBack() {
      const a = document.getElementById('backHome');
      if (!a) return;
      a.addEventListener('click', function(e) {
        if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        if (typeof document.startViewTransition !== 'function') return;
        e.preventDefault();
        document.startViewTransition(function() {
          window.location.assign(a.getAttribute('href'));
        });
      });
    })();

    (async function main() {
      const app = document.getElementById('app');
      const { round, season } = qs();
      if (!Number.isFinite(round) || round < 1) {
        app.innerHTML = '<div class="err">Missing or invalid <code>round</code>. Open a race from the season calendar on the dashboard.</div>';
        document.body.classList.add('race-ready');
        return;
      }
      app.innerHTML = '<div class="loading">Loading race…</div>';
      try {
        const raceJ = await fetchJson(`${JOLPICA}/${season}/${round}.json`);
        const race = raceJ?.MRData?.RaceTable?.Races?.[0];
        if (!race) throw new Error('empty');

        let results = [];
        try {
          const resJ = await fetchJson(`${JOLPICA}/${season}/${round}/results.json`);
          const R = resJ?.MRData?.RaceTable?.Races?.[0];
          results = Array.isArray(R?.Results) ? R.Results : [];
        } catch (_) { /* upcoming or no results */ }

        document.title = `${race.raceName || 'Race'} · Pit Wall`;
        app.innerHTML = render(race, results);
      } catch (e) {
        app.innerHTML = `<div class="err">Could not load this round (${esc(season)} / R${esc(String(round))}). Try again from the calendar.</div>`;
      }
      requestAnimationFrame(function() {
        document.body.classList.add('race-ready');
      });
    })();
  </script>
</body>
</html>
